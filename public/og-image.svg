<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1850"/>
      <stop offset="100%" stop-color="#0e0a18"/>
    </linearGradient>
    <radialGradient id="glow" cx="12%" cy="18%" r="50%">
      <stop offset="0%" stop-color="rgba(125,79,209,0.25)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Tank mark -->
  <g transform="translate(440,120) scale(2.4)">
    <rect x="22" y="22" width="156" height="156" rx="14" fill="none" stroke="#a583e8" stroke-width="2.4"/>
    <rect x="32" y="32" width="136" height="136" rx="10" fill="none" stroke="#7d4fd1" stroke-width="1" opacity="0.55"/>
    <rect x="62" y="62" width="76" height="76" rx="10" fill="#fff"/>
    <text x="100" y="122" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="500" font-size="56" fill="#4a2a8a">j</text>
    <rect x="178" y="95" width="6" height="10" rx="1.5" fill="#a583e8"/>
    <circle cx="187" cy="100" r="2.5" fill="#a583e8"/>
  </g>

  <text x="600" y="460" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="56" fill="#f0ebfa" letter-spacing="-1">
    justwriting
  </text>
  <text x="600" y="510" text-anchor="middle" font-family="Lora,Georgia,serif" font-style="italic" font-weight="500" font-size="24" fill="#a583e8" letter-spacing="-0.5">
    Тихий редактор для свободного письма
  </text>
  <text x="600" y="555" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="400" font-size="16" fill="#9d8fc0">
    A quiet editor for free writing
  </text>
