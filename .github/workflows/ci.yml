name: CI

on:
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: npm audit --audit-level=moderate
      continue-on-error: true
    - run: npm run typecheck
    - run: npm run lint
    - run: npm run test:ci
    - run: npm run build
    - name: Bundle size report
      run: |
        echo "=== Bundle size report ==="
        ls -lh dist/assets/*.js | awk '{print $5, $9}' | sort -rn | head -15
    - name: Bundle size comparison
      run: |
        # Save current build
        mkdir -p /tmp/current-dist
        cp -r dist/assets/* /tmp/current-dist/
        # Build base branch
        git fetch origin main
        git checkout origin/main -- .
        npm ci
        npm run build
        mkdir -p /tmp/base-dist
        cp -r dist/assets/* /tmp/base-dist/
        # Compare
        git checkout -- .
        npx tsx scripts/bundle-compare.ts /tmp/base-dist /tmp/current-dist
    - name: Bundle size budget
      run: |
        MAX_INDEX=600000   # index-*.js fail-порог (байты)
        MAX_VENDOR=500000  # vendor-*.js warn-порог
        MAX_CSS=150000     # *.css fail-порог (байты)
        fail=0
        for f in dist/assets/index-*.js; do
          sz=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
          echo "index: $f = $sz"
          [ "$sz" -gt "$MAX_INDEX" ] && { echo "::error::$f > $MAX_INDEX"; fail=1; }
        done
        for f in dist/assets/vendor-*.js; do
          sz=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
          [ "$sz" -gt "$MAX_VENDOR" ] && echo "::warning::$f > $MAX_VENDOR ($sz)"
        done
        for f in dist/assets/*.css; do
          sz=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
          echo "css: $f = $sz"
          [ "$sz" -gt "$MAX_CSS" ] && { echo "::error::$f > $MAX_CSS"; fail=1; }
        done
        exit $fail
    - name: Install Playwright
      run: npx playwright install chromium
    - name: E2E Tests
      run: npm run build && npx playwright test --project=chromium
    - name: Functions build & test
      run: cd functions && npm ci && npm run build && npm test
  deploy-functions:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.base_ref == 'main'
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: cd functions && npm ci && npm run build
    - run: npx firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }}
