name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Firebase web config is public (ships in the client bundle); provided so
      # test:ci / build / prerender / E2E can boot the app in CI.
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}
      VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - run: npm ci
    - run: npm audit --omit=dev --audit-level=high  # gate on shipped (prod) deps; dev tooling CVEs (firebase-tools etc.) don't reach users
    - run: npm run typecheck
    - run: npm run lint
    - run: npm run test:ci
    - run: npm run build
    - name: Bundle size report
      run: |
        echo "=== Bundle size report ==="
        ls -lh dist/assets/*.js | awk '{print $5, $9}' | sort -rn | head -15
    - name: Bundle size comparison
      run: |
        # Save current build
        mkdir -p /tmp/current-dist
        cp -r dist/assets/* /tmp/current-dist/
        # Build base branch
        git fetch origin main
        git checkout origin/main -- .
        npm ci
        npm run build
        mkdir -p /tmp/base-dist
        cp -r dist/assets/* /tmp/base-dist/
        # Compare
        git checkout -- .
        npx tsx scripts/bundle-compare.ts /tmp/base-dist /tmp/current-dist
    - name: Bundle size budget
      run: |
        MAX_INDEX=750000   # index-*.js fail-порог (байты)
        MAX_VENDOR=500000  # vendor-*.js warn-порог
        MAX_CSS=185000     # *.css fail-порог (байты)
        fail=0
        for f in dist/assets/index-*.js; do
          sz=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
          echo "index: $f = $sz"
          [ "$sz" -gt "$MAX_INDEX" ] && { echo "::error::$f > $MAX_INDEX"; fail=1; }
        done
        for f in dist/assets/vendor-*.js; do
          sz=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
          [ "$sz" -gt "$MAX_VENDOR" ] && echo "::warning::$f > $MAX_VENDOR ($sz)"
        done
        for f in dist/assets/*.css; do
          sz=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f")
          echo "css: $f = $sz"
          [ "$sz" -gt "$MAX_CSS" ] && { echo "::error::$f > $MAX_CSS"; fail=1; }
        done
        exit $fail
    - name: Install Playwright
      run: npx playwright install chromium
    - name: E2E Tests
      run: npm run build && npx playwright test --project=chromium
    - name: Functions build & test
      run: cd functions && npm ci && npm run build && npm test
    - name: Set up Java for Firebase Emulator
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Cache Firebase Emulator
      uses: actions/cache@v4
      with:
        path: ~/.cache/firebase/emulators
        key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('functions/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-firebase-emulators-
    - name: Run rules and emulator tests
      run: cd functions && npm run test:rules && npm run test:emulator
  # Functions are deployed manually (`firebase deploy --only functions`) until the
  # VPS + Supabase migration retires Firebase. No auto-deploy job: a Firebase CI
  # service account would be infra built for a backend that's being removed.
